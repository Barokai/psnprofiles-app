name: Android Build & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release?'
        required: false
        type: boolean
        default: false
      release_version:
        description: 'Release version (e.g. 1.1.0) - only used if Create Release is true'
        required: false
        type: string

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :androidApp:assembleDebug --stacktrace --warning-mode all 2>&1 | tee build-output.log; exit ${PIPESTATUS[0]}

      - name: Upload Problems Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-problems-report
          path: build/reports/problems/
          if-no-files-found: ignore

      - name: Summarise Build Problems
        if: failure()
        run: |
          REPORT="build/reports/problems/problems-report.html"
          echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          if [ -f "$REPORT" ]; then
            echo "📄 **Gradle Problems Report** uploaded as artifact \`gradle-problems-report\`." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "### Compiler Errors" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          grep "^e: " build-output.log 2>/dev/null | head -30 >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: psnprofiles-app-debug
          path: androidApp/build/outputs/apk/debug/*.apk

  release:
    name: Create GitHub Release
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: psnprofiles-app-debug
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.release_version }}
          name: Release v${{ github.event.inputs.release_version }}
          files: "*.apk"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
